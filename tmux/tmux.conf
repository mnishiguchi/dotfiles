## General

set -g default-terminal "tmux-256color"
set -g mouse on
set -g history-limit 10000
set -g renumber-windows on

set -g base-index 1
setw -g pane-base-index 1

# Keep Escape responsive in Vim/Neovim while preserving Alt-key sequences.
set -s escape-time 10


## Window names

# Block shell/program escape sequences from renaming tmux windows.
set -g allow-rename off

# Let tmux rename windows from the current pane directory instead.
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'


## Splits

bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"


## Pane navigation

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


## Copy mode

setw -g mode-keys vi

# Copy tmux selections to the external terminal clipboard when supported.
# This is safer than "on" because apps inside tmux cannot set tmux buffers.
set -s set-clipboard external

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel


## Pane style

# Dim inactive panes.
setw -g window-style "fg=colour244,bg=colour238"
setw -g window-active-style "fg=white,bg=black"


## Status line

set -g status-style "bg=#282a36,fg=#f8f8f2"
setw -g window-status-current-style "bg=#82AAFF,fg=#282a36,bold"

# Show an obvious indicator only while the prefix key is active.
set -g status-right "#{?client_prefix,#[reverse] PREFIX #[default],}"


## Commands

bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

bind g new-window \
  -n "lazygit" \
  -c "#{pane_current_path}" \
  "env GIT_EDITOR=nvim lazygit"
